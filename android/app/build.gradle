apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

// Release signing values must come from ~/.gradle/gradle.properties or CI env vars.
// Do not commit release passwords/aliases in repository files.
def releaseStoreFilePath = providers.gradleProperty("BRUNCHBODY_RELEASE_STORE_FILE").orElse(providers.environmentVariable("BB_RELEASE_STORE_FILE")).getOrNull()
def releaseStorePassword = providers.gradleProperty("BRUNCHBODY_RELEASE_STORE_PASSWORD").orElse(providers.environmentVariable("BB_RELEASE_STORE_PASSWORD")).getOrNull()
def releaseKeyAlias = providers.gradleProperty("BRUNCHBODY_RELEASE_KEY_ALIAS").orElse(providers.environmentVariable("BB_RELEASE_KEY_ALIAS")).getOrNull()
def releaseKeyPassword = providers.gradleProperty("BRUNCHBODY_RELEASE_KEY_PASSWORD").orElse(providers.environmentVariable("BB_RELEASE_KEY_PASSWORD")).getOrNull()
def hasReleaseSigningValues = [releaseStoreFilePath, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every { it != null && !it.toString().trim().isEmpty() }
def releaseStoreFile = releaseStoreFilePath ? file(releaseStoreFilePath) : null

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.brunchbody"
    defaultConfig {
        applicationId "com.brunchbody"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "1.0.1"
        buildConfigField "boolean", "IS_EDGE_TO_EDGE_ENABLED", "true"
    }

    packagingOptions {
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libjsc.so'
        pickFirst '**/com/facebook/react/views/view/WindowUtilKt.dex'
        pickFirst '**/com/facebook/react/views/view/WindowUtilKt.class'
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/license.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/notice.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/*.kotlin_module'
        // Exclude problematic WindowUtilKt files
        exclude '**/WindowUtilKt.dex'
        exclude '**/WindowUtilKt.class'
        // Add more specific exclusions for duplicate classes
        exclude '**/com/facebook/react/views/view/WindowUtilKt.*'
        pickFirst '**/com/facebook/react/views/view/WindowUtilKt.*'
        // Use pickFirst for all WindowUtilKt related files
        pickFirst '**/WindowUtilKt.*'
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseSigningValues) {
                storeFile releaseStoreFile
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    // Add this to handle duplicate class issues
    configurations.all {
        resolutionStrategy {
            force 'com.facebook.react:react-android:0.80.2'
            // Force specific versions to avoid conflicts
            force 'androidx.core:core-ktx:1.12.0'
            force 'androidx.appcompat:appcompat:1.6.1'
            // Force specific React Native versions to avoid conflicts
            force 'com.facebook.react:react-native:0.80.2'
        }
    }

    // Handle duplicate classes in release builds
    android.applicationVariants.all { variant ->
        if (variant.buildType.name == 'release') {
            variant.mergeAssetsProvider.configure {
                doLast {
                    delete(fileTree(dir: outputDir, includes: ['**/WindowUtilKt.*']))
                }
            }
        }
    }

    // Add specific configuration for release builds
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            // Add specific configuration to handle duplicate classes
            ndk {
                abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
            }
        }
    }

    // Add specific task to handle WindowUtilKt issue
    tasks.whenTaskAdded { task ->
        if (task.name.contains('mergeDexRelease')) {
            task.doFirst {
                // Remove duplicate WindowUtilKt files before merging
                def buildDir = new File("${project.buildDir}/intermediates/project_dex_archive/release/dexBuilderRelease/out")
                if (buildDir.exists()) {
                    buildDir.eachDirRecurse { dir ->
                        dir.eachFile { file ->
                            if (file.name.contains('WindowUtilKt')) {
                                file.delete()
                            }
                        }
                    }
                }
            }
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def isReleaseBuild = graph.allTasks.any { task ->
        task.name.toLowerCase().contains("release")
    }

    if (isReleaseBuild) {
        def missing = []
        if (!releaseStoreFilePath) missing << "BRUNCHBODY_RELEASE_STORE_FILE / BB_RELEASE_STORE_FILE"
        if (!releaseStorePassword) missing << "BRUNCHBODY_RELEASE_STORE_PASSWORD / BB_RELEASE_STORE_PASSWORD"
        if (!releaseKeyAlias) missing << "BRUNCHBODY_RELEASE_KEY_ALIAS / BB_RELEASE_KEY_ALIAS"
        if (!releaseKeyPassword) missing << "BRUNCHBODY_RELEASE_KEY_PASSWORD / BB_RELEASE_KEY_PASSWORD"

        if (!missing.isEmpty()) {
            throw new GradleException("Missing release signing values. Set in ~/.gradle/gradle.properties or CI secrets: ${missing.join(', ')}")
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")
