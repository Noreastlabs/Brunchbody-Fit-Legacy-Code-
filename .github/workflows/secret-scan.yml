name: Secret scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret scan (changed + full repo)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            echo "range=${base}..${head}" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check security override label
        if: github.event_name == 'pull_request'
        id: override
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const hasOverride = labels.includes('security-override-approved');
            core.setOutput('enabled', hasOverride ? 'true' : 'false');
            core.info(hasOverride
              ? 'security-override-approved label present for this PR.'
              : 'No security override label found; secret findings will fail CI.');

      - name: Require explicit security review for secret scan policy updates
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            const securityPolicyFiles = new Set([
              '.github/workflows/secret-scan.yml',
              '.secret-scan-exclusions',
              '.secret-scan-config.sh',
              'scripts/check-secrets.sh',
            ]);

            const overrideTouched = changedFiles.some((file) => securityPolicyFiles.has(file.filename));

            if (!overrideTouched) {
              core.info('No secret scan policy files changed.');
              return;
            }

            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const approved = labels.includes('security-review-approved');

            if (!approved) {
              core.setFailed(
                'Secret scan policy update detected without explicit security review. Add the security-review-approved label after security review to unblock.'
              );
            } else {
              core.info('security-review-approved label present for secret scan policy update.');
            }

      - name: Validate repository and commit range for committed secrets
        id: scan
        continue-on-error: true
        run: ./scripts/check-secrets.sh --range="${{ steps.range.outputs.range }}" --report=secret-scan-report.txt

      - name: Enforce failure policy for secret detections
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.scan.outcome }}" == "success" ]]; then
            echo "Secret scan passed."
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" && "${{ steps.override.outputs.enabled }}" == "true" ]]; then
            {
              echo "## ⚠️ Security override applied"
              echo
              echo "A secret scan detection occurred, but CI was explicitly overridden by the 'security-override-approved' label."
              echo "A security reviewer must validate and track remediation before merge."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Secret scan failed but override label is present; allowing job to continue."
            exit 0
          fi

          echo "Secret scan detected findings and no valid override was provided. Failing CI."
          exit 1

      - name: Attach scan results to job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Secret scan results'
            echo
            cat secret-scan-report.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secret-scan-report.txt
