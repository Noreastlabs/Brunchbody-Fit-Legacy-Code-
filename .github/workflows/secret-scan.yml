name: Secret scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret scan (changed + full repo)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            echo "range=${base}..${head}" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require explicit security review for secret scan policy updates
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            const securityPolicyFiles = new Set([
              '.github/workflows/secret-scan.yml',
              '.secret-scan-exclusions',
              '.secret-scan-config.sh',
              'scripts/check-secrets.sh',
            ]);

            const overrideTouched = changedFiles.some((file) => securityPolicyFiles.has(file.filename));

            if (!overrideTouched) {
              core.info('No secret scan policy files changed.');
              return;
            }

            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const approved = labels.includes('security-review-approved') && labels.includes('security-override-approved');

            if (!approved) {
              core.setFailed(
                'Secret scan policy update detected without explicit security review. Add both security-review-approved and security-override-approved labels after security review to unblock.'
              );
            } else {
              core.info('Required security approval labels are present for secret scan policy update.');
            }

      - name: Validate repository and commit range for committed secrets
        id: scan
        continue-on-error: true
        run: ./scripts/check-secrets.sh --range="${{ steps.range.outputs.range }}" --report=secret-scan-report.txt

      - name: Enforce scan result (default fail, explicit security override only)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const scanConclusion = '${{ steps.scan.outcome }}';

            if (scanConclusion === 'success') {
              core.info('Secret scan passed.');
              return;
            }

            if (context.eventName !== 'pull_request') {
              core.setFailed('Secret scan failed on protected branch push. Security override labels are not available for push events.');
              return;
            }

            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const approved = labels.includes('security-review-approved') && labels.includes('security-override-approved');

            if (!approved) {
              core.setFailed('Secret scan failed. Add both security-review-approved and security-override-approved labels after explicit security review to override.');
              return;
            }

            core.warning('Secret scan findings were explicitly overridden by security review labels: security-review-approved + security-override-approved.');

      - name: Attach scan results to job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Secret scan results'
            echo
            cat secret-scan-report.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secret-scan-report.txt
