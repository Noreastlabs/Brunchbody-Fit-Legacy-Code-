name: Secret scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            echo "range=${base}..${head}" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require explicit security review for secret-scan overrides
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            const overrideTouched = changedFiles.some((file) =>
              file.filename === '.secret-scan-exclusions' ||
              file.filename === '.secret-scan-config.sh'
            );

            if (!overrideTouched) {
              core.info('No secret-scan override files changed.');
              return;
            }

            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const approved = labels.includes('security-review-approved');

            if (!approved) {
              core.setFailed(
                'Secret scanning override detected (.secret-scan-exclusions or .secret-scan-config.sh changed) without explicit security review. Add the security-review-approved label after security review.'
              );
            } else {
              core.info('security-review-approved label present for override change.');
            }

      - name: Validate repository and commit range for committed secrets
        run: ./scripts/check-secrets.sh --range="${{ steps.range.outputs.range }}"
