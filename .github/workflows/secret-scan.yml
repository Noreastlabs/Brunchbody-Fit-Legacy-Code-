name: Secret scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  secret-scan:
    name: Secret scan (required)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            echo "range=${base}..${head}" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require explicit security review for secret scan policy updates
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            const securityPolicyFiles = new Set([
              '.github/workflows/secret-scan.yml',
              '.secret-scan-exclusions',
              '.secret-scan-exclusions-justifications.csv',
              '.secret-scan-config.sh',
              'scripts/check-secrets.sh',
            ]);

            const overrideTouched = changedFiles.some((file) => securityPolicyFiles.has(file.filename));

            if (!overrideTouched) {
              core.info('No secret scan policy files changed.');
              return;
            }

            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const approved = labels.includes('security-review-approved') && labels.includes('secret-scan-override-approved');

            if (!approved) {
              core.setFailed(
                'Secret scan policy update detected without explicit security review. Add both security-review-approved and secret-scan-override-approved labels after security review to unblock.'
              );
            } else {
              core.info('Required security approval labels are present for secret scan policy update.');
            }

      - name: Validate repository and commit range for committed secrets
        id: scan
        continue-on-error: true
        run: yarn run check:secrets --range="${{ steps.range.outputs.range }}" --report=secret-scan-report.txt

      - name: Enforce secret scan result and controlled override on PRs
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        with:
          script: |
            const outcome = process.env.SCAN_OUTCOME;
            if (outcome !== 'failure') {
              core.info('Secret scan completed without detections.');
              return;
            }

            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const hasSecurityReview = labels.includes('security-review-approved');
            const hasOverride = labels.includes('secret-scan-override-approved');

            if (!hasSecurityReview || !hasOverride) {
              core.setFailed(
                'Secret scan detected high-risk content. This check hard-fails by default. To override, a security reviewer must add BOTH labels: security-review-approved and secret-scan-override-approved.'
              );
              return;
            }

            core.warning(
              'Secret scan override accepted for this PR after explicit security review. Ensure remediation or post-merge rotation plan is tracked before merge.'
            );

      - name: Enforce hard fail on non-PR events
        if: always() && github.event_name != 'pull_request' && steps.scan.outcome == 'failure'
        shell: bash
        run: |
          echo "Secret scan detections are never overridable on non-PR events (including protected branch pushes)."
          exit 1

      - name: Attach scan results to job summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Secret scan results'
            echo
            cat secret-scan-report.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-report
          path: secret-scan-report.txt
