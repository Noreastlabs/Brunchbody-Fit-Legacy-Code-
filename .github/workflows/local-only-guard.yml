name: Local-only guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  local-only-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enforce local-only remote integration guard
        run: npm run check:local-only
