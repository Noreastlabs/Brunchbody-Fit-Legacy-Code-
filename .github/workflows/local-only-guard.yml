name: Local-only guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  local-only-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Enforce local-only remote integration guard
        run: yarn run check:local-only
